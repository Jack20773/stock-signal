name: report

on:
  schedule:
    # 每週一 UTC 02:00 = 台灣時間週一 10:00
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      last_n:
        description: '報告包含最新幾集'
        required: false
        default: '50'

permissions:
  contents: write   # 需要 push gh-pages

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Generate detail HTML and send email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: |
          python notifier.py \
            --last ${{ github.event.inputs.last_n || '50' }} \
            --detail-url https://Jack20773.github.io/stock-signal/

      - name: Deploy detail HTML to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          # 用 git plumbing 直接寫入 gh-pages，不需切換 branch
          BLOB=$(git hash-object -w report_detail.html)
          TREE=$(printf "100644 blob %s\tindex.html\n" "$BLOB" | git mktree)
          PARENT=$(git rev-parse origin/gh-pages 2>/dev/null || echo "")
          if [ -n "$PARENT" ]; then
            COMMIT=$(git commit-tree "$TREE" -p "$PARENT" -m "chore: update report [skip ci]")
          else
            COMMIT=$(git commit-tree "$TREE" -m "chore: init gh-pages [skip ci]")
          fi
          git push origin "$COMMIT":refs/heads/gh-pages
