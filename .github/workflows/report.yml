name: report

on:
  schedule:
    # 每週一 UTC 02:00 = 台灣時間週一 10:00
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      last_n:
        description: '報告包含最新幾集'
        required: false
        default: '20'

permissions:
  contents: read

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Send email report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: |
          python notifier.py \
            --last ${{ github.event.inputs.last_n || '20' }} \
            --detail-url https://Jack20773.github.io/stock-signal/
