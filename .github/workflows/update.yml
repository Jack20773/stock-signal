name: 每週自動分析

on:
  schedule:
    # 每週一 UTC 23:00 = 台灣時間週二早上 07:00
    - cron: "0 23 * * 1"
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write   # 需要 push gh-pages

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache transcripts
        uses: actions/cache@v4
        with:
          path: transcripts/
          key: transcripts-${{ github.run_id }}
          restore-keys: |
            transcripts-

      - name: 下載逐字稿 + 分析 + 更新績效
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: |
          python -X utf8 update.py \
            --last 5 \
            --report-last 50 \
            --send \
            --detail-url https://Jack20773.github.io/stock-signal/
        # --last 5：只跑最新 5 集（已分析的會自動跳過）
        # --report-last 50：email 顯示最新 50 集
        # --send：分析完寄 Email 報告
        # --detail-url：email 按鈕連到 GitHub Pages 完整報告

      - name: 生成完整報告（GitHub Pages 用）
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -X utf8 notifier.py --no-fill --no-send

      - name: 部署完整報告到 GitHub Pages
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          BLOB=$(git hash-object -w report_detail.html)
          TREE=$(printf '100644 blob %s\tindex.html\n' "$BLOB" | git mktree)
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages
            PARENT=$(git rev-parse FETCH_HEAD)
            COMMIT=$(git commit-tree "$TREE" -p "$PARENT" -m "chore: update report [skip ci]")
          else
            COMMIT=$(git commit-tree "$TREE" -m "chore: init gh-pages [skip ci]")
          fi
          git push origin "$COMMIT":refs/heads/gh-pages

      - name: 上傳執行 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-log-${{ github.run_number }}
          path: batch.log
          retention-days: 14
