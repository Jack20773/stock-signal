name: 股癌訊號追蹤

on:
  schedule:
    # 每週一 UTC 02:00 = 台灣時間週一 10:00
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      last_n:
        description: '分析最新幾集（預設 20）'
        required: false
        default: '20'
      report_n:
        description: '報告包含最新幾集（預設 50）'
        required: false
        default: '50'

permissions:
  contents: write   # 需要 push 更新後的 signals.db

jobs:
  analyze-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 逐字稿 cache：第一次跑會完整下載（約 6 分鐘），後續只補新集
      - name: Restore transcripts cache
        uses: actions/cache@v4
        with:
          path: transcripts/
          key: transcripts-${{ github.run_id }}
          restore-keys: transcripts-

      - name: Download new transcripts
        run: python download_transcripts.py

      - name: Analyze new episodes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          LAST=${{ github.event.inputs.last_n || '20' }}
          python batch.py --last $LAST

      - name: Commit updated signals.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.db
          git diff --staged --quiet && echo "No changes to signals.db" || (
            git commit -m "chore: update signals.db [skip ci]"
            git push
          )

      - name: Send report email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: |
          N=${{ github.event.inputs.report_n || '50' }}
          python notifier.py --last $N
