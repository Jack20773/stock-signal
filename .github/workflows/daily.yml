name: daily-update

on:
  schedule:
    # 每天台灣時間 06:00 (UTC 22:00 前一天)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      # 逐字稿快取：只下載新集，舊的從 cache 拿
      - uses: actions/cache@v4
        with:
          path: transcripts/
          key: transcripts-${{ github.run_id }}
          restore-keys: transcripts-

      - name: Download new transcripts
        run: python download_transcripts.py

      - name: Analyze new episodes (skip already-analyzed)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python batch.py

      - name: Commit updated signals.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.db
          git diff --staged --quiet && echo "No changes to signals.db" || (
            git commit -m "chore: update signals.db [skip ci]"
            git push
          )

      - name: Generate full detail HTML (all episodes, no email)
        run: python notifier.py --no-send

      - name: Deploy detail HTML to GitHub Pages
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          BLOB=$(git hash-object -w report_detail.html)
          TREE=$(printf '100644 blob %s\tindex.html\n' "$BLOB" | git mktree)
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages
            PARENT=$(git rev-parse FETCH_HEAD)
            COMMIT=$(git commit-tree "$TREE" -p "$PARENT" -m "chore: update report [skip ci]")
          else
            COMMIT=$(git commit-tree "$TREE" -m "chore: init gh-pages [skip ci]")
          fi
          git push origin "$COMMIT":refs/heads/gh-pages
