name: analyze

on:
  workflow_dispatch:
    inputs:
      last_n:
        description: '分析最新幾集（已分析過的自動跳過）'
        required: false
        default: '10'

permissions:
  contents: write   # 需要 push 更新後的 signals.db

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      # 逐字稿 cache：第一次跑完整下載，後續只補新集
      - uses: actions/cache@v4
        with:
          path: transcripts/
          key: transcripts-${{ github.run_id }}
          restore-keys: transcripts-

      - name: Download new transcripts
        run: python download_transcripts.py

      - name: Analyze new episodes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python batch.py --last ${{ github.event.inputs.last_n || '10' }}

      - name: Commit updated signals.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.db
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: update signals.db [skip ci]"
            git push
          )
